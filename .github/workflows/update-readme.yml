name: Auto-update README Stats

on:
  push:
    branches:
      - main
    paths:
      - 'recipes.csv'
      - 'regions.csv'
      - 'ingredients.csv'
      - 'instructions.csv'
      - 'update_readme.py'

jobs:
  update-readme:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.x'

    - name: Run Readme Aggregator
      run: python update_readme.py

    - name: Commit and Push Changes
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        git add README.md
        git diff --quiet && git diff --staged --quiet || (git commit -m "docs: auto-update dataset statistics" && git push)